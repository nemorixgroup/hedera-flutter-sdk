name: hedera_flutter_sdk
description: >
  The first native Flutter/Dart SDK for the Hedera network.
  Supports account management, HBAR transfers, Hedera Token
  Service (HTS), Hedera Consensus Service (HCS), Mirror Node
  REST client, and real-time WebSocket subscriptions.
  Pure Dart and no platform channels required.
version: 0.0.1-dev
repository: https://github.com/nemorixgroup/hedera-flutter-sdk
homepage: https://nemorixpay.com
issue_tracker: https://github.com/nemorixgroup/hedera-flutter-sdk/issues

topics:
  - hedera
  - blockchain
  - hbar
  - hts
  - web3
  - dart
  - flutter
  - payments

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  # BIP-39 mnemonics - English and Spanish support
  bip39: ^1.0.6

  # Hex encoding and decoding utilities
  convert: ^3.1.1

  # Int64 support required by Protobuf
  fixnum: ^1.1.0

  flutter:
    sdk: flutter

  # gRPC transport - communicates with Hedera consensus nodes
  grpc: ^5.1.0

  # HTTP client - Mirror Node REST API
  http: ^1.2.1

  # Immutable annotation for model classes
  meta: ^1.17.0

  # Cryptography - ED25519 and ECDSA key generation and signing
  pointycastle: ^3.9.1

  # Protobuf runtime - required for HAPI definitions
  protobuf: ^6.0.0

  # WebSocket - real-time subscriptions via Mirror Node
  web_socket_channel: ^3.0.3

dev_dependencies:
  # Code generation for mockito
  build_runner: ^2.4.9

  # Code coverage reporting
  coverage: ^1.7.2

  flutter_test:
    sdk: flutter

  # Mock generation for unit tests
  mockito: ^5.4.4

  # pub.dev quality linter - enforces Dart best practices
  very_good_analysis: ^10.2.0

flutter:
  # This SDK does not use Flutter widgets directly.
  # It is a pure Dart library usable in any Flutter application.